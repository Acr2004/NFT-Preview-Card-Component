<!DOCTYPE html>

<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">

        <link rel="icon" type="image/png" sizes="32x32" href="Images/favicon-32x32.png">
        <link rel="stylesheet" href="style.css">
        <link rel="preconnect" href="https://fonts.googleapis.com">

        <title>Frontend Mentor | NFT Preview Card Component</title>
    </head>

    <body>
        <div class="container">
            <div>
                <img id="image">
            </div>

            <div class="content">
                <h5 id="main-text">Equilibrium #3429</h5>
                <p id="secondary-text">Our Equilibrium collection promotes balance and calm.</p>
            </div>

            <div>
                <span>
                    <img id="ethereum" href="Images/icon-ethereum.svg" alt="Ethereum Icon">
                    0.041 ETH
                </span>
                <span>
                    <img id="clock" href="Images/icon-clock.svg" alt="Clock Icon">
                    3 days left
                </span>
            </div>

            <hr>

            <div>
                <img id="view" href="Images/icon-view.svg">
                <p id="creation">Creation of</p>
                <p id="name">Jules Wyvern</p>
            </div>
        </div>
    </body>
</html>
