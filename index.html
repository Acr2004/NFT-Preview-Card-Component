<!DOCTYPE html>

<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">

        <link rel="icon" type="image/png" sizes="32x32" href="Images/favicon-32x32.png">
        <link rel="stylesheet" href="style.css">
        <link rel="preconnect" href="https://fonts.googleapis.com">

        <title>Frontend Mentor | NFT Preview Card Component</title>
    </head>

    <body>
        <div class="container">
            <div>
                <img id="image" src="Images/image-equilibrium.jpg">
                <span class="anim">
                    <img id="view" src="Images/icon-view.svg">
                </span>
            </div>

            <div class="content">
                <h5 id="main-text">Equilibrium #3429</h5>
                <p id="secondary-text">Our Equilibrium collection promotes balance and calm.</p>
            </div>

            <div class="price-time">
                <div class="align">
                    <img id="ethereum" src="Images/icon-ethereum.svg" alt="Ethereum Icon">
                    <span id="price">0.041 ETH</span>
                </div>
                <div class="align">
                    <img id="clock" src="Images/icon-clock.svg" alt="Clock Icon">
                    <span id="time">3 days left</span>
                </div>
            </div>

            <hr>

            <div class="creator">
                <img id="pic" src="Images/image-avatar.png">
                <p id="creation">Creation of</p>
                <p id="name">Jules Wyvern</p>
            </div>
        </div>
    </body>
</html>
